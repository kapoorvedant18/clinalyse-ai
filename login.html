<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · Clinalyse AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">Clinalyse AI</a>
      <nav class="nav">
        <a class="nav-link" href="index.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card centered-card" aria-label="Login">
      <h1>Welcome back</h1>
      <p>Enter your email to continue to your dashboard.</p>

      <form id="loginForm" class="form" autocomplete="off">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" autocomplete="email" />

        <button type="submit" class="primary-btn">Continue</button>
        <p class="small">This is a demo UI. No password needed for now.</p>
      </form>

      <p id="error" class="error" role="alert" aria-live="polite"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="small">Not a real medical system. For demo purposes only.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
